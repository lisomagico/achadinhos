<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Achadinos — Gerador de Posts Shopee</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --shopee: #EE4D2D; --shopee-dark: #C53D20; --shopee-light: #FFF0ED;
    --wpp: #25D366; --wpp-dark: #1aab54;
    --bg: #F7F5F2; --card: #FFFFFF; --text: #1A1A1A; --muted: #6B6560; --border: #E8E4E0;
    --radius: 16px; --radius-sm: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--shopee); padding: 20px 24px 60px; position: relative; overflow: hidden; }
  header::after { content: ''; position: absolute; bottom: -30px; left: 0; right: 0; height: 60px; background: var(--bg); border-radius: 40px 40px 0 0; }
  .header-inner { max-width: 560px; margin: 0 auto; position: relative; z-index: 1; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .logo-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: white; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.75); margin-left: 46px; }
  main { max-width: 560px; margin: 0 auto; padding: 0 16px 60px; }
  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
  .input-wrap { display: flex; gap: 8px; align-items: stretch; }
  .input-wrap input { flex: 1; padding: 13px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
  .input-wrap input:focus { border-color: var(--shopee); }
  .input-wrap input::placeholder { color: #AAA; }
  .btn-gerar { background: var(--shopee); color: white; border: none; padding: 13px 20px; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s; }
  .btn-gerar:hover { background: var(--shopee-dark); }
  .btn-gerar:active { transform: scale(0.97); }
  .btn-gerar:disabled { background: #CCC; cursor: not-allowed; transform: none; }
  .status { display: none; align-items: center; gap: 10px; padding: 14px 18px; background: var(--shopee-light); border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 13px; color: var(--shopee); font-weight: 500; }
  .status.show { display: flex; }
  .spinner { width: 16px; height: 16px; border: 2.5px solid rgba(238,77,45,0.25); border-top-color: var(--shopee); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result-card { display: none; flex-direction: column; }
  .result-card.show { display: flex; }
  .product-img-wrap { width: 100%; height: 220px; border-radius: var(--radius-sm); overflow: hidden; background: var(--bg); margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
  .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .product-img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #CCC; font-size: 13px; }
  .badge-shopee { display: inline-block; background: var(--shopee); color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 1.2px; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .product-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; line-height: 1.35; color: var(--text); margin-bottom: 12px; }
  .price-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .price-de { font-size: 14px; color: var(--muted); text-decoration: line-through; }
  .price-por { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--shopee); line-height: 1; }
  .badge-desconto { background: var(--shopee-light); color: var(--shopee); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; padding: 3px 10px; border-radius: 20px; }
  .post-text-box { background: var(--bg); border-radius: var(--radius-sm); padding: 16px; font-size: 14px; line-height: 1.75; color: var(--text); white-space: pre-wrap; word-break: break-word; margin-bottom: 20px; border: 1px solid var(--border); }
  .actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-wpp { background: var(--wpp); color: white; border: none; padding: 16px 20px; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; }
  .btn-wpp:hover { background: var(--wpp-dark); }
  .btn-copy { background: white; color: var(--text); border: 1.5px solid var(--border); padding: 13px 20px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
  .btn-copy:hover { background: var(--bg); }
  .btn-copy.copied { background: #F0FFF7; border-color: var(--wpp); color: var(--wpp-dark); }
  .dica { margin-top: 14px; padding: 12px 16px; background: #FFFBF0; border-left: 3px solid #F5A623; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 12.5px; color: #7A6200; line-height: 1.6; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🛍️</div>
      <span class="logo-text">Achadinos</span>
    </div>
    <p class="header-sub">Gerador de posts para o grupo</p>
  </div>
</header>
<main>
  <div class="card">
    <p class="card-title">Cole o link do produto</p>
    <div class="input-wrap">
      <input type="text" id="shopee-link" placeholder="https://s.shopee.com.br/..." />
      <button class="btn-gerar" id="btn-gerar" onclick="gerarPost()">Gerar ✨</button>
    </div>
  </div>
  <div class="status" id="status-area">
    <div class="spinner"></div>
    <span id="status-msg">Buscando produto na Shopee...</span>
  </div>
  <div class="card result-card" id="result-area">
    <span class="badge-shopee">SHOPEE • ACHADINHO</span>
    <div class="product-img-wrap">
      <div class="product-img-placeholder" id="img-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="1.5" width="40" height="40"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Imagem do produto
      </div>
      <img id="product-img" style="display:none;" alt="Produto" crossorigin="anonymous" />
    </div>
    <p class="product-name" id="product-name"></p>
    <div class="price-row">
      <span class="price-de" id="price-de"></span>
      <span class="price-por" id="price-por"></span>
      <span class="badge-desconto" id="badge-desc"></span>
    </div>
    <div class="post-text-box" id="post-text"></div>
    <div class="actions">
      <button class="btn-wpp" onclick="compartilharWpp()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2C6.477 2 2 6.477 2 12c0 1.99.574 3.844 1.565 5.41L2 22l4.718-1.535C8.11 21.374 9.999 22 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
        Compartilhar no WhatsApp
      </button>
      <button class="btn-copy" id="btn-copy" onclick="copiarTexto()">📋 Copiar texto do post</button>
    </div>
    <div class="dica">💡 Clique em Compartilhar → WhatsApp abre com o texto pronto → selecione o grupo → envie!</div>
  </div>
</main>
<script>
async function gerarPost() {
  const link = document.getElementById('shopee-link').value.trim();
  if (!link) { alert('Cola o link da Shopee primeiro!'); return; }
  document.getElementById('status-msg').textContent = 'Buscando produto na Shopee...';
  document.getElementById('status-area').classList.add('show');
  document.getElementById('result-area').classList.remove('show');
  document.getElementById('btn-gerar').disabled = true;
  try {
    const res = await fetch('/api/gerar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ link })
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error || 'Erro');
    document.getElementById('product-name').textContent = d.nome || '';
    document.getElementById('price-de').textContent = d.preco_de || '';
    document.getElementById('price-por').textContent = d.preco_por || '';
    document.getElementById('badge-desc').textContent = d.desconto ? d.desconto + ' OFF' : '';
    document.getElementById('post-text').textContent = d.post_text || '';
    const img = document.getElementById('product-img');
    const ph = document.getElementById('img-placeholder');
    if (d.img_url) {
      img.src = d.img_url;
      img.style.display = 'block';
      ph.style.display = 'none';
    } else {
      img.style.display = 'none';
      ph.style.display = 'flex';
    }
    document.getElementById('result-area').classList.add('show');
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    alert('Erro ao gerar: ' + e.message);
  } finally {
    document.getElementById('status-area').classList.remove('show');
    document.getElementById('btn-gerar').disabled = false;
  }
}
function compartilharWpp() {
  const texto = document.getElementById('post-text').textContent;
  window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
}
function copiarTexto() {
  const texto = document.getElementById('post-text').textContent;
  navigator.clipboard.writeText(texto).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✅ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar texto do post'; btn.classList.remove('copied'); }, 2500);
  });
}
</script>
</body>
</html>
